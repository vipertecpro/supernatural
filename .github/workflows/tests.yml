name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm

      - name: Validate Composer manifest
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Audit PHP dependencies
        run: composer audit --no-interaction

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit production frontend dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Prepare isolated test environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check PHP formatting
        run: vendor/bin/pint --test --format agent

      - name: Run PHP static analysis
        run: composer run types:check

      - name: Run backend tests
        run: php artisan test --compact

      - name: Check ESLint
        run: npm run lint:check

      - name: Check Prettier
        run: npm run format:check

      - name: Check TypeScript
        run: npm run types:check

      - name: Build production frontend
        run: npm run build
